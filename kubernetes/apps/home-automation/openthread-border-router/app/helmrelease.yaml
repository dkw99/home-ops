---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openthread-border-router
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: openthread-border-router
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    global:
      createDefaultServiceAccount: false
    controllers:
      openthread-border-router:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          annotations:
            k8s.v1.cni.cncf.io/networks: kube-system/lan@lan0
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
        containers:
          app:
            image:
              repository: bnutzer/otbr-tcp
              tag: latest@sha256:b9566c636adabac2c359a98e983b4f6155115570377409ef945258984ab07bf3
            env:
              OTBR_BACKBONE_IF: lan0
              OT_LOG_LEVEL: "5"
              OTBR_RCP_ADDITIONAL_ARGS: ""
              OTBR_THREAD_IF: wpan0
              OTBR_WEB_ENABLE: "1"
              RCP_HOST: 192.168.16.20
              RCP_PORT: "7638"
              TZ: Australia/Sydney
            securityContext:
              privileged: true
              allowPrivilegeEscalation: true
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi

    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: openthread-border-router
        ports:
          http:
            port: 80
          rest:
            port: 8081

    persistence:
      data:
        existingClaim: openthread-border-router-data
        globalMounts:
          - path: /var/lib/thread
      tun:
        type: hostPath
        hostPath: /dev/net/tun
        globalMounts:
          - path: /dev/net/tun
