---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: lan
spec:
  config: |-
    {
      "cniVersion": "0.3.1",
      "name": "lan",
      "plugins": [
        {
          "type": "macvlan",
          "master": "ens20",
          "mode": "bridge",
          "ipam": {
            "type": "static",
            "addresses": [
              {
                "address": "192.168.2.252/24",
                "gateway": "192.168.2.1"
              }
            ],
            "routes": [
              {
                "dst": "224.0.0.251/32"
              },
              {
                "dst": "239.255.255.250/32"
              }
            ]
          }
        }
      ]
    }
