---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2beta2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mealie
  namespace: default
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: mealie
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 2
  values:
    global:
      createDefaultServiceAccount: false
    defaultPodOptions:
      automountServiceAccountToken: true
    controllers:
      mealie:
        replicas: 1
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/mealie-recipes/mealie
              tag: v3.20.0
            env:
              BASE_URL: https://mealie.${SECRET_DOMAIN}
              ALLOW_SIGNUP: false
              API_DOCS: false
              SMTP_HOST: ${ROUTER_IP}
              SMTP_PORT: 25
              SMTP_AUTH_STRATEGY: NONE
              SMTP_FROM_EMAIL: mealie@${SECRET_DOMAIN}
              # OIDC_AUTH_ENABLED: true
              # OIDC_SIGNUP_ENABLED: true
              # OIDC_CONFIGURATION_URL: https://auth.${SECRET_DOMAIN}/.well-known/openid-configuration
              # OIDC_CLIENT_ID: mealie
              # OIDC_USER_CLAIM: preferred_username
              # OIDC_AUTO_REDIRECT: false
              # OIDC_GROUPS_CLAIM: groups
              # OIDC_ADMIN_GROUP: admins
              # OIDC_USER_GROUP: family
            resources:
              requests:
                cpu: 50m
                memory: 500Mi
              limits:
                cpu: 200m
                memory: 800Mi
    service:
      app:
        controller: mealie
        ports:
          http:
            port: 9000
    route:
      app:
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-external
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: http
    persistence:
      config:
        enabled: true
        existingClaim: mealie-config
        globalMounts:
          - path: /app/data
      # backups:
      #   enabled: true
      #   type: nfs
      #   server: nas16.internal
      #   path: /volume1/k3sCluster/Apps/External/Backups
      #   globalMounts:
      #     - path: /app/data/backups
