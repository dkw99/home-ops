---
version: "3"


tasks:
  setup:
    - task: taint:k3s-c
    - task: init:sops-age
    - task: init:flux

  taint:k3s-c:
    desc: apply taints to k3s-c Octoprint
    cmds:
      - kubectl --kubeconfig={{.KUBECONFIG_DIR}}/kubeconfig taint nodes k3s-c restricted-node=octoprint-server:NoSchedule

  init:sops-age:
    desc: initilaise cluster sops-age secrets
    cmds:
      - kubectl --kubeconfig={{.KUBECONFIG_DIR}}/kubeconfig create namespace flux-system --dry-run=client -o yaml | kubectl --kubeconfig={{.KUBECONFIG_DIR}}/kubeconfig apply -f -
      - kubectl --kubeconfig={{.KUBECONFIG_DIR}}/kubeconfig -n flux-system create secret generic sops-age --from-file=age.agekey={{.SOPS_AGE_KEY_DIR}}/keys.txt
  init:flux:
    desc: initialise flux-system
    cmds:
      - kubectl --kubeconfig={{.KUBECONFIG_DIR}}/kubeconfig apply --kustomize={{.CLUSTER_DIR}}/base/flux-system
      - kubectl --kubeconfig={{.KUBECONFIG_DIR}}/kubeconfig apply --kustomize={{.CLUSTER_DIR}}/base/flux-system
