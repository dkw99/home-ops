---
version: "3"

tasks:
  taint-k3s-c:
  desc: apply taints to k3s-c Octoprint
  cmds:
    - "kubectl taint nodes k3s-c restriced-node=octoprint-server:NoSchedule"

  init-sops-age:
    desc: initilaise cluster sops-age secrets
    cmds:
      - "kubectl --kubeconfig=./provision/kubeconfig create namespace flux-system --dry-run=client -o yaml"
      - sleep 5
      - "cat ~/.config/sops/age/keys.txt kubectl --kubeconfig=./provision/kubeconfig -n flux-system create secret generic sops-age --from-file=age.agekey=/dev/stdin"
