---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: &app home-assistant
  namespace: home-automation
spec:
  interval: 15m
  chart:
    spec:
      # renovate: registryUrl=https://k8s-at-home.com/charts/
      chart: home-assistant
      version: 13.2.0
      sourceRef:
        kind: HelmRepository
        name: k8s-at-home-charts
        namespace: flux-system
  values:
    image:
      repository: homeassistant/home-assistant
      tag: 2022.6.6
    env:
      TZ: ${TIMEZONE}
    envFrom:
    ## TODO Remove old Secrets
      - secretRef:
          name: home-assistant-secrets
      - secretRef:
          name: *app
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    service:
      main:
        type: ClusterIP
        annotations:
          metallb.universe.tf/loadBalancerIPs: ${HASS_IP}
        ports:
          http:
            port: 8123
    podAnnotations:
      secret.reloader.stakater.com/reload: "home-assistant"
    probes:
      liveness:
        enabled: false
      readiness:
        enabled: false
      startup:
        enabled: false
    ingress:
      main:
        enabled: true
        ingressClassName: "nginx"
        annotations:
          nginx.org/websocket-services: home-assistant
          external-dns/is-public: "true"
          external-dns.alpha.kubernetes.io/target: "ipv4.${SECRET_DOMAIN}"
          cert-manager.io/cluster-issuer: letsencrypt-production
          hajimari.io/enable: "true"
          hajimari.io/icon: home-assistant
          ingress.kubernetes.io/whitelist-x-forwarded-for: "true"
        hosts:
          - host: &host-release "{{ .Release.Name }}.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
          - host: &host-custom "hass.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
        tls:
          - hosts:
              - *host-release
              - *host-custom
    persistence:
      config:
        enabled: true
        existingClaim: home-assistant-config
      backups:
        enabled: true
        type: custom
        volumeSpec:
          nfs:
            server: "nfs1.${SECRET_PRIVATE_DOMAIN}"
            path: /volume1/k3sCluster/Apps/External/Backups/home_assistant
        mountPath: /config/backups
        accessMode: ReadWriteOnce
        size: 1M
    addons:
      codeserver:
        enabled: true
        image:
          repository: codercom/code-server
          tag: 4.4.0
        workingDir: /config
        args:
          - --auth
          - none
          - --user-data-dir
          - /config/.vscode
          - --extensions-dir
          - /config/.vscode
        env:
          HASS_SERVER: http://localhost:8123
          HASS_TOKEN: ${HASS_CONFIG_ACCESS_TOKEN}
        git:
          deployKeySecret: home-assistant-code-server
        ingress:
          enabled: true
          ingressClassName: "nginx"
          annotations:
            external-dns.alpha.kubernetes.io/target: ${SECRET_DOMAIN}
            cert-manager.io/cluster-issuer: letsencrypt-production
            hajimari.io/enable: "true"
            hajimari.io/icon: settings
            # nginx.ingress.kubernetes.io/auth-url: https://auth.${SECRET_DOMAIN}/oauth2/auth
            # nginx.ingress.kubernetes.io/auth-signin: https://auth.${SECRET_DOMAIN}/oauth2/start
          hosts:
            - host: &host-release-code "{{ .Release.Name }}-code.${SECRET_DOMAIN}"
              paths:
                - path: /
                  pathType: Prefix
            - host: &host-custom-code "hass-code.${SECRET_DOMAIN}"
              paths:
                - path: /
                  pathType: Prefix
          tls:
            - hosts:
                - *host-release-code
                - *host-custom-code
        volumeMounts:
          - name: config
            mountPath: /config
    resources:
      requests:
        cpu: 100m
        memory: 100Mi
      limits:
        memory: 750Mi
