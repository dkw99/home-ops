---
apiVersion: helm.toolkit.fluxcd.io/v2beta1
kind: HelmRelease
metadata:
  name: metallb
  namespace: metallb-system
spec:
  interval: 5m
  chart:
    spec:
      # renovate: registryUrl=https://metallb.github.io/metallb
      chart: metallb
      version: 0.12.1
      sourceRef:
        kind: HelmRepository
        name: metallb-charts
        namespace: flux-system
  values:
    configInline:
      peers:
        - peer-address: ${ROUTER_IP}
          peer-asn: ${BGP_PEER_ASN}
          my-asn: ${BGP_PEER_ASN}
      address-pools:
        - name: bgp
          protocol: bgp
          addresses:
            - ${K8S_LB_CIDR}
          avoid-buggy-ips: true
